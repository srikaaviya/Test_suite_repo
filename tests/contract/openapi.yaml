openapi: "3.0.3"
info:
  title: Restful Booker API
  version: "1.0"
servers:
  - url: https://restful-booker.herokuapp.com

paths:
  /ping:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "201":
          description: API is alive

  /auth:
    post:
      operationId: createToken
      summary: Create auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "400":
          description: Bad request

  /booking:
    get:
      operationId: getBookingIds
      summary: Get booking IDs
      parameters:
        - name: firstname
          in: query
          schema:
            type: string
        - name: lastname
          in: query
          schema:
            type: string
        - name: checkin
          in: query
          schema:
            type: string
            format: date
        - name: checkout
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of booking IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    bookingid:
                      type: integer
        "500":
          description: Internal server error

    post:
      operationId: createBooking
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Booking"
      responses:
        "200":
          description: Booking created
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingid:
                    type: integer
                  booking:
                    $ref: "#/components/schemas/Booking"
        "400":
          description: Bad request
        "500":
          description: Internal server error

  /booking/{id}:
    get:
      operationId: getBooking
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

    put:
      operationId: updateBooking
      summary: Update a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Booking"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Bad request
        "403":
          description: Forbidden

    patch:
      operationId: partialUpdateBooking
      summary: Partial update a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstname:
                  type: string
                lastname:
                  type: string
                totalprice:
                  type: integer
                depositpaid:
                  type: boolean
                bookingdates:
                  $ref: "#/components/schemas/BookingDates"
                additionalneeds:
                  type: string
      responses:
        "200":
          description: Booking updated
        "400":
          description: Bad request
        "403":
          description: Forbidden

    delete:
      operationId: deleteBooking
      summary: Delete a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Booking deleted
        "403":
          description: Forbidden

components:
  schemas:
    BookingDates:
      type: object
      properties:
        checkin:
          type: string
        checkout:
          type: string
      required: [checkin, checkout]

    Booking:
      type: object
      properties:
        firstname:
          type: string
        lastname:
          type: string
        totalprice:
          type: integer
        depositpaid:
          type: boolean
        bookingdates:
          $ref: "#/components/schemas/BookingDates"
        additionalneeds: {}
      required: [firstname, lastname, totalprice, depositpaid, bookingdates]
